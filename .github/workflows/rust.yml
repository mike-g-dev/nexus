name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
      with:
        components: rustfmt, clippy
    - name: Check formatting
      run: cargo fmt --all --check
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
    - name: Build
      run: cargo build
    - name: Run tests
      run: cargo test
    - name: Run tests (all features, excluding nexus-net, nexus-web, nexus-async-web)
      run: cargo test --workspace --all-features --exclude nexus-net --exclude nexus-web --exclude nexus-async-web
    - name: Test nexus-net (default - sync)
      run: cargo test -p nexus-net
    - name: Test nexus-net (sync + TLS)
      run: cargo test -p nexus-net --features tls
    - name: Test nexus-web (default)
      run: cargo test -p nexus-web
    - name: Test nexus-web (all features)
      run: cargo test -p nexus-web --all-features
    - name: Test nexus-async-web (tokio-rt + tls, default)
      run: cargo test -p nexus-async-web
    - name: Test nexus-async-web (nexus + tls)
      run: cargo test -p nexus-async-web --no-default-features --features nexus,tls --lib
    - name: Test nexus-async-web (nexus, no tls)
      run: cargo test -p nexus-async-web --no-default-features --features nexus --lib

  msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
    - name: Verify MSRV
      run: cargo build --workspace

  test-avx2:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
    - name: Test nexus-inference (AVX2 SIMD path)
      run: |
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-feature=+avx2" \
          cargo test -p nexus-inference --target x86_64-unknown-linux-gnu

  verify-pytorch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install safetensors packaging numpy
    - name: Generate fixtures from PyTorch
      run: python nexus-inference/tests/fixtures/generate_all.py
    - name: Verify Rust matches PyTorch (scalar)
      run: cargo test -p nexus-inference --features safetensors --test safetensors_integration
    - name: Verify Rust matches PyTorch (AVX2)
      run: |
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-feature=+avx2" \
          cargo test -p nexus-inference --features safetensors --test safetensors_integration \
          --target x86_64-unknown-linux-gnu

  verify-lightgbm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.94.0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python dependencies
      run: pip install lightgbm==4.6.0 numpy
    - name: Generate fixtures from LightGBM
      run: python nexus-inference/tests/fixtures/generate_lightgbm.py
    - name: Verify fixtures are in sync
      run: git diff --exit-code nexus-inference/tests/fixtures/lgb_*
    - name: Verify Rust matches LightGBM
      run: cargo test -p nexus-inference --features loader-lightgbm --test lightgbm_integration
